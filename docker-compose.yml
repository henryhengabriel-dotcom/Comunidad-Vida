services:

  app:
    build: .
    ports: 
      - "5000:5000"
    env_file:
      - .env
    
    depends_on:
       db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
    - "3307:3306"
    env_file:
    - .env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
